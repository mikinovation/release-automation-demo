name: リリース自動化

# マニュアル実行のみ
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（例: 1.0.0）'
        required: true
        default: '0.0.0'

jobs:
  release-tasks:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3
      
      - name: リリースタスクの取得と記録
        uses: ./
        id: release-tasks
        with:
          notion-api-key: ${{ secrets.NOTION_API_KEY }}
          database-id: ${{ secrets.NOTION_DATABASE_ID }}
          spreadsheet-id: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          sheet-name: 'リリース履歴'
          google-credentials-json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          version: ${{ github.event.inputs.version }}
      
      - name: リリース結果の表示
        run: |
          echo "取得したタスク数: ${{ steps.release-tasks.outputs.task-count }}"
          echo "スプレッドシートURL: ${{ steps.release-tasks.outputs.spreadsheet-url }}"
