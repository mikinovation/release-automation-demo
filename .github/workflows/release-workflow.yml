name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースのバージョン番号 (例: 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  pull-requests: write

jobs:
  process-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Notionからリリースタスクを取得してスプレッドシートに記録
      - name: Run Release Automation
        id: release-automation
        uses: ./
        with:
          notion-api-key: ${{ secrets.NOTION_API_KEY }}
          database-id: ${{ secrets.NOTION_DATABASE_ID }}
          spreadsheet-id: ${{ secrets.SPREADSHEET_ID }}
          sheet-name: 'リリース履歴'
          google-credentials-json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          version: ${{ github.event.inputs.version }}
